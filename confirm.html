<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Subscription — Ferocia Sports</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db.js"></script>
<script src="assets.js"></script>
<style>
  :root{
    --blue:#174CCC;--lime:#C6F221;--teal:#24BC96;--teal-light:#d4f5ed;
    --orange:#F26024;--orange-light:#fde8d8;--blue-pale:#e8f0ff;
    --dark:#080f2e;--white:#fff;--text:#0d1f4a;--muted:#6b7a99;
    --border:#d6dff5;--bg:#f0f2f8;--radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

  /* ── HEADER ─────────────────────────────────────────── */
  header{
    background:var(--dark);padding:0 28px;
    display:flex;align-items:center;height:68px;
    border-bottom:3px solid var(--lime);
  }
  .logo{height:30px;width:auto;}

  /* ── MAIN ────────────────────────────────────────────── */
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 20px;}

  /* ── CARD ────────────────────────────────────────────── */
  .card{
    background:var(--white);border-radius:var(--radius);
    padding:48px 40px;max-width:460px;width:100%;
    text-align:center;
    box-shadow:0 8px 40px rgba(23,76,204,0.1);
    border:0.5px solid var(--border);
  }

  .icon{
    width:80px;height:80px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 24px;font-size:36px;
  }
  .icon.success{background:var(--teal-light);box-shadow:0 8px 24px rgba(36,188,150,0.2);}
  .icon.error{background:var(--orange-light);box-shadow:0 8px 24px rgba(242,96,36,0.15);}
  .icon.loading{background:var(--blue-pale);}

  h2{
    font-family:'Bebas Neue',sans-serif;
    font-size:32px;color:var(--text);margin-bottom:12px;
    letter-spacing:1px;
  }
  p{font-size:14px;color:var(--muted);line-height:1.7;}

  .divider{
    height:3px;
    background:linear-gradient(90deg,var(--blue),var(--lime));
    border-radius:99px;margin:24px 0;
  }

  /* ── FOOTER ──────────────────────────────────────────── */
  footer{
    text-align:center;padding:28px 16px;
    border-top:3px solid var(--lime);background:var(--dark);
  }
  .footer-tag{display:block;font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(156,227,255,0.5);margin-bottom:10px;}
  .footer-logo{height:26px;width:auto;}
</style>
</head>
<body>
<header>
  <img class="logo" data-asset="ferociaLogo" alt="Ferocia">
</header>
<main>
  <div class="card" id="card">
    <div class="icon loading" id="icon">⏳</div>
    <h2 id="title">Confirming your subscription...</h2>
    <div class="divider"></div>
    <p id="msg">Please wait a moment.</p>
  </div>
</main>
<footer>
  <span class="footer-tag">Brought to you by</span>
  <img class="footer-logo" data-asset="ferociaLogo" alt="Ferocia Sports">
</footer>
<script>
(function () {
  'use strict';

  const setState = (iconText, iconClass, title, msg) => {
    const iconEl = document.getElementById('icon');
    iconEl.textContent = iconText;
    iconEl.className = `icon ${iconClass}`;
    document.getElementById('title').textContent = title;
    document.getElementById('msg').textContent = msg;
  };

  (async () => {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('t');

    if (!token) {
      setState('❌', 'error', 'Invalid Link', 'This confirmation link is invalid. Please try subscribing again.');
      return;
    }

    if (!/^[A-Za-z0-9_-]+$/.test(token)) {
      setState('❌', 'error', 'Invalid Link', 'This confirmation link is malformed.');
      return;
    }

    try {
      const { data: ok, error: rpcError } = await supabase.rpc(
        'confirm_subscriber',
        { p_token: token },
      );
      if (rpcError) throw new Error(rpcError.message);
      if (ok) {
        setState(
          '🎉',
          'success',
          "You're Subscribed!",
          "Your email has been confirmed. Welcome to the Ferocia Sports community! You'll now receive updates about new ladders, tournaments, and events.",
        );
      } else {
        setState(
          '✅',
          'success',
          'Already Confirmed',
          "This link has already been used, or your subscription is already active. You're all set!",
        );
      }
    } catch (err) {
      setState('❌', 'error', 'Something Went Wrong', 'Please try again or contact us at contact@ferociasports.com');
    }
  })();
})();
</script>
</body>
</html>
