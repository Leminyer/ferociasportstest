<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferocia Sports Center — Player Portal</title>
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="Ferocia Sports Center">
  <meta property="og:title"       content="Ladder Standings — Ferocia Sports Center">
  <meta property="og:description" content="View current pickleball ladder standings, player rankings and session results at Ferocia Sports Center.">
  <meta property="og:image"       content="https://ferociasports.com/og-preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height"content="630">
  <meta property="og:url"         content="https://ferociasports.com/players.html">
  <meta name="twitter:card"       content="summary_large_image">
  <meta name="twitter:title"      content="Ladder Standings — Ferocia Sports Center">
  <meta name="twitter:description"content="View current pickleball ladder standings, player rankings and session results at Ferocia Sports Center.">
  <meta name="twitter:image"      content="https://ferociasports.com/og-preview.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db.js"></script>
<script src="assets.js"></script>
<style>
  :root {
    --blue:#174CCC; --blue-light:#9CE3FF; --blue-pale:#e8f0ff;
    --teal:#24BC96; --teal-light:#d4f5ed;
    --lime:#C6F221; --lime-dark:#7a9200;
    --orange:#F26024; --orange-light:#fde8d8;
    --gray:#EFEFEF; --gray-dk:#888;
    --white:#ffffff; --text:#0d1f4a; --text-muted:#6b7a99;
    --border:#d6dff5; --bg:#f0f2f8;
    --gold:#FFD700; --silver:#C0C0C0; --bronze:#CD7F32;
    --radius:14px; --radius-sm:8px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Montserrat',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }

  /* ── HEADER ─────────────────────────────────────────── */
  header {
    background:#080f2e;
    padding:0 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    height:68px;
    border-bottom:3px solid var(--lime);
    position:sticky;
    top:0;
    z-index:100;
  }
  .header-left { display:flex; align-items:center; gap:16px; }
  .header-logo { height:30px; max-width:140px; width:auto; object-fit:contain; display:block; }
  .header-divider { width:1px; height:24px; background:rgba(255,255,255,0.12); }
  .header-tagline { font-size:10px; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.4); }
  .ladder-pill {
    font-size:11px; font-weight:700; color:var(--blue-light);
    background:rgba(156,227,255,0.12); padding:6px 14px;
    border-radius:99px; border:1px solid rgba(156,227,255,0.2);
    white-space:nowrap;
  }

  /* ── NAV TABS ────────────────────────────────────────── */
  nav {
    background:var(--white);
    border-bottom:0.5px solid var(--border);
    display:flex;
    padding:0 28px;
    position:sticky;
    top:68px;
    z-index:99;
    box-shadow:0 2px 8px rgba(23,76,204,0.06);
  }
  nav button {
    background:none; border:none;
    padding:16px 18px;
    font-size:11px; font-family:'Montserrat',sans-serif;
    font-weight:800; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--text-muted); cursor:pointer;
    border-bottom:3px solid transparent;
    white-space:nowrap; transition:color .15s,border-color .15s;
    display:flex; align-items:center; gap:6px;
  }
  nav button.active { color:var(--blue); border-bottom-color:var(--lime); }
  nav button:hover:not(.active) { color:var(--text); }

  /* ── LAYOUT ──────────────────────────────────────────── */
  main { max-width:960px; margin:0 auto; padding:32px 20px 48px; }
  .page { display:none; } .page.active { display:block; }

  /* ── PODIUM ──────────────────────────────────────────── */
  .podium-section { margin-bottom:24px; background:var(--white); border:0.5px solid var(--border); border-radius:var(--radius); padding:24px 20px 0; box-shadow:0 2px 12px rgba(23,76,204,0.05); }
  .section-eyebrow {
    font-size:10px; font-weight:800; letter-spacing:3px;
    text-transform:uppercase; color:var(--text-muted);
    margin-bottom:20px; display:flex; align-items:center; gap:12px;
  }
  .podium-section-wrap { margin-bottom:24px; }
  .section-eyebrow::after { content:''; flex:1; height:1px; background:var(--border); }

  .podium { display:flex; justify-content:center; align-items:flex-end; gap:16px; margin-bottom:16px; }
  .podium-slot { display:flex; flex-direction:column; align-items:center; gap:8px; flex:1; max-width:180px; }

  .podium-avatar {
    width:64px; height:64px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size:24px; color:white;
    position:relative; letter-spacing:1px;
  }
  .podium-avatar.gold   { background:linear-gradient(135deg,#FFD700,#FFA500); box-shadow:0 8px 24px rgba(255,180,0,0.4); }
  .podium-avatar.silver { background:linear-gradient(135deg,#C0C0C0,#A8A8A8); box-shadow:0 8px 24px rgba(192,192,192,0.35); }
  .podium-avatar.bronze { background:linear-gradient(135deg,#CD7F32,#A0522D); box-shadow:0 8px 24px rgba(180,100,30,0.35); }
  .podium-crown { position:absolute; top:-16px; font-size:20px; }

  .podium-name { font-size:13px; font-weight:800; text-align:center; line-height:1.3; color:var(--text); }
  .podium-pts  { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--blue); }

  .podium-bar {
    width:100%; border-radius:10px 10px 0 0;
    display:flex; align-items:center; justify-content:center;
  }
  .podium-bar.gold   { background:rgba(255,215,0,0.12); border:1.5px solid rgba(255,215,0,0.35); border-bottom:none; height:88px; }
  .podium-bar.silver { background:rgba(192,192,192,0.12); border:1.5px solid rgba(192,192,192,0.35); border-bottom:none; height:64px; }
  .podium-bar.bronze { background:rgba(205,127,50,0.12); border:1.5px solid rgba(205,127,50,0.3); border-bottom:none; height:48px; }
  .podium-bar .medal { font-size:26px; }

  /* ── CARDS ───────────────────────────────────────────── */
  .card {
    background:var(--white);
    border:0.5px solid var(--border);
    border-radius:var(--radius);
    padding:24px;
    margin-bottom:20px;
    box-shadow:0 2px 12px rgba(23,76,204,0.05);
  }
  .card-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:20px; flex-wrap:wrap; gap:10px;
  }
  .card-title {
    font-size:11px; font-weight:800; letter-spacing:2px;
    text-transform:uppercase; color:var(--text-muted);
  }

  /* ── STANDINGS TABLE ─────────────────────────────────── */
  .filter-select {
    font-size:12px; padding:7px 12px;
    font-family:'Montserrat',sans-serif; font-weight:700;
    border:0.5px solid var(--border); border-radius:99px;
    background:white; color:var(--text); cursor:pointer;
    outline:none;
  }
  .filter-select:focus { border-color:var(--blue); }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  th {
    text-align:left; padding:10px 14px;
    font-size:10px; font-weight:800; color:var(--text-muted);
    text-transform:uppercase; letter-spacing:1px;
    border-bottom:1.5px solid var(--border);
  }
  td { padding:13px 14px; border-bottom:0.5px solid var(--border); }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#f8f9ff; }

  .rank-num {
    font-family:'Bebas Neue',sans-serif; font-size:24px;
    color:var(--text-muted); min-width:32px; display:inline-block;
    text-align:center;
  }
  .rank-num.top1 { color:#c8920a; }
  .rank-num.top2 { color:#888; }
  .rank-num.top3 { color:#9e6229; }

  .player-cell { display:flex; align-items:center; gap:12px; }
  .player-initials {
    width:36px; height:36px; border-radius:50%;
    background:var(--blue-pale); color:var(--blue);
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:800; flex-shrink:0;
  }
  .player-initials.top1 { background:rgba(255,215,0,0.15); color:#9a6e00; }
  .player-initials.top2 { background:rgba(192,192,192,0.2); color:#555; }
  .player-initials.top3 { background:rgba(205,127,50,0.15); color:#7a3d00; }
  .player-name { font-size:13px; font-weight:700; color:var(--text); }
  .player-sub  { font-size:11px; font-weight:600; color:var(--text-muted); margin-top:1px; }

  .points-display {
    font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--blue);
  }
  .badge-sub {
    display:inline-block; font-size:9px; font-weight:800;
    letter-spacing:.5px; text-transform:uppercase;
    padding:3px 8px; border-radius:99px;
    background:var(--orange-light); color:var(--orange);
  }

  /* ── SESSION HISTORY ─────────────────────────────────── */
  .session-block {
    margin-bottom:10px; border:0.5px solid var(--border);
    border-radius:var(--radius-sm); overflow:hidden;
    background:var(--white);
  }
  .session-date-header {
    display:flex; align-items:center; gap:12px;
    padding:14px 18px; cursor:pointer;
    background:#f8f9ff; user-select:none;
    transition:background .15s;
  }
  .session-date-header:hover { background:var(--blue-pale); }
  .session-date-chevron {
    font-size:10px; color:var(--blue); font-weight:800;
    transition:transform .2s; display:inline-block;
    width:20px; height:20px; border-radius:50%;
    background:var(--blue-pale); display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .session-date-chevron.open { transform:rotate(90deg); }
  .session-date-info { flex:1; }
  .session-date-label { font-size:13px; font-weight:800; color:var(--blue); }
  .session-date-sub   { font-size:11px; font-weight:600; color:var(--text-muted); margin-top:2px; }
  .session-date-body  { display:none; padding:16px 18px; border-top:0.5px solid var(--border); }
  .session-date-body.open { display:block; }
  .session-court-label {
    font-size:10px; font-weight:800; color:var(--blue);
    text-transform:uppercase; letter-spacing:1.5px;
    margin:14px 0 8px; display:flex; align-items:center; gap:8px;
  }
  .session-court-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .session-court-label:first-child { margin-top:0; }
  .game-row {
    margin-bottom:8px; padding:12px 14px;
    background:var(--bg); border-radius:var(--radius-sm);
    font-size:13px; border-left:3px solid var(--lime);
    display:flex; flex-wrap:wrap; align-items:center; gap:8px;
  }
  .game-label {
    font-weight:800; color:var(--text-muted);
    font-size:10px; text-transform:uppercase;
    letter-spacing:1px; flex-shrink:0;
  }

  /* ── LOADING / EMPTY ─────────────────────────────────── */
  .loading, .empty {
    text-align:center; padding:48px 16px;
    color:var(--text-muted); font-weight:600; font-size:13px;
  }
  .error-screen { text-align:center; padding:80px 24px; }
  .error-screen h2 { font-size:20px; margin:12px 0 8px; color:var(--orange); font-weight:800; }
  .error-screen p  { color:var(--text-muted); font-weight:500; }

  /* ── FOOTER ──────────────────────────────────────────── */
  footer {
    text-align:center; padding:28px 16px; margin-top:8px;
    border-top:3px solid var(--lime); background:#080f2e;
  }
  .footer-tag { display:block; font-size:9px; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:rgba(156,227,255,0.5); margin-bottom:10px; }
  .footer-logo { height:26px; width:auto; }

  /* ── MOBILE ──────────────────────────────────────────── */
  @media(max-width:600px) {
    main { padding:20px 14px 48px; }
    header { padding:0 16px; height:60px; }
    nav { padding:0 16px; top:60px; overflow-x:auto; }
    nav button { padding:14px 12px; font-size:10px; }
    .header-tagline { display:none; }
    .header-divider  { display:none; }
    .podium { gap:8px; }
    .podium-avatar { width:52px; height:52px; font-size:20px; }
    .podium-bar.gold   { height:72px; }
    .podium-bar.silver { height:52px; }
    .podium-bar.bronze { height:40px; }
    .card { padding:18px 16px; }
    th, td { padding:10px 10px; }
    .player-initials { display:none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <img class="header-logo" data-asset="ferociaLogo" alt="Ferocia">
    <div class="header-divider"></div>
    <div class="header-tagline">Player Portal</div>
  </div>
  <span class="ladder-pill" id="ladder-name">Loading...</span>
</header>

<nav>
  <button class="active" id="tab-standings" data-tab="standings">🏆 Standings</button>
  <button id="tab-sessions" data-tab="sessions">📋 Sessions</button>
</nav>

<main>
  <div id="page-standings" class="page active">
    <div id="standings-content"><div class="loading">Loading standings...</div></div>
  </div>
  <div id="page-sessions" class="page">
    <div class="card">
      <div class="card-title">Session History</div>
      <div id="sessions-content"><div class="loading">Loading sessions...</div></div>
    </div>
  </div>
</main>

<footer>
  <span class="footer-tag">Brought to you by</span>
  <img class="footer-logo" data-asset="ferociaLogo" alt="Ferocia Sports">
</footer>

<script>
(function () {
  'use strict';

  const params  = new URLSearchParams(window.location.search);
  const encoded = params.get('l');
  let ladderId  = null;
  try { ladderId = encoded ? atob(encoded) : null; } catch (_) { ladderId = null; }

  let ladderData        = null;
  let allMatches        = [];
  let ladderPlayers     = [];
  let currentGenderFilter = 'all';

  // Tab navigation
  document.querySelectorAll('nav button[data-tab]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.tab;
      document.querySelectorAll('.page').forEach((p) => p.classList.remove('active'));
      document.querySelectorAll('nav button').forEach((b) => b.classList.remove('active'));
      document.getElementById(`page-${name}`).classList.add('active');
      btn.classList.add('active');
    });
  });

  // Gender filter
  document.addEventListener('change', (e) => {
    if (e.target && e.target.id === 'gender-filter') {
      currentGenderFilter = e.target.value;
      renderStandings();
    }
  });

  const getInitials = (first, last) =>
    ((first || '')[0] || '').toUpperCase() + ((last || '')[0] || '').toUpperCase();

  const calcPlayerPoints = () => {
    const pm = {};
    ladderPlayers.forEach((p) => (pm[p.id] = 0));
    allMatches.forEach((m) => {
      if (pm[m.player_id] !== undefined) pm[m.player_id] += m.points_earned || 0;
    });
    return pm;
  };

  const renderPodium = (players, label) => {
    const medals = ['gold', 'silver', 'bronze'];
    const crowns  = ['👑', '', ''];
    const top     = players.slice(0, 3);
    const order   = top.length === 1 ? [0] : top.length === 2 ? [1, 0] : [1, 0, 2];

    return `
      <div class="podium-section">
        <div class="section-eyebrow">${label === 'Men' ? '🏆 Top Men' : '🏆 Top Women'}</div>
        <div class="podium">
          ${order.map((idx) => {
            if (idx >= top.length) return '';
            const p      = top[idx];
            const medal  = medals[idx];
            const crown  = crowns[idx];
            const rankClass = idx === 0 ? 'top1' : idx === 1 ? 'top2' : 'top3';
            return `
              <div class="podium-slot">
                <div class="podium-avatar ${medal}">
                  ${esc(getInitials(p.first_name, p.last_name))}
                  ${crown ? `<span class="podium-crown">${crown}</span>` : ''}
                </div>
                <div class="podium-name">${esc(p.first_name)}<br>${esc(p.last_name)}</div>
                <div class="podium-pts">${p._points} pts</div>
                <div class="podium-bar ${medal}">
                  <span class="medal">${idx === 0 ? '🥇' : idx === 1 ? '🥈' : '🥉'}</span>
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  };

  const renderStandings = () => {
    const pm     = calcPlayerPoints();
    const active = ladderPlayers.filter((p) => p.ladder_status === 'active');
    active.sort((a, b) => (pm[b.id] || 0) - (pm[a.id] || 0));
    active.forEach((p, i) => { p._rank = i + 1; p._points = pm[p.id] || 0; });

    const men   = active.filter((p) => p.gender === 'Male');
    const women = active.filter((p) => p.gender === 'Female');

    let html = '';
    if (men.length)   html += renderPodium(men,   'Men');
    if (women.length) html += renderPodium(women, 'Women');

    const filtered = active.filter(
      (p) => currentGenderFilter === 'all' || p.gender === currentGenderFilter,
    );

    html += `
      <div class="card">
        <div class="card-header">
          <div class="card-title">Full Standings</div>
          <select class="filter-select" id="gender-filter">
            <option value="all"    ${currentGenderFilter === 'all'    ? 'selected' : ''}>All Players</option>
            <option value="Male"   ${currentGenderFilter === 'Male'   ? 'selected' : ''}>Men</option>
            <option value="Female" ${currentGenderFilter === 'Female' ? 'selected' : ''}>Women</option>
          </select>
        </div>
        <table>
          <thead>
            <tr>
              <th style="width:48px;">Rank</th>
              <th>Player</th>
              <th style="text-align:right;">Points</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.map((p, i) => {
              const rank      = currentGenderFilter === 'all' ? i + 1 : p._rank;
              const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
              return `<tr>
                <td><span class="rank-num ${rankClass}">${rank}</span></td>
                <td>
                  <div class="player-cell">
                    <div class="player-initials ${rankClass}">${esc(getInitials(p.first_name, p.last_name))}</div>
                    <div>
                      <div class="player-name">${esc(p.first_name)} ${esc(p.last_name)}</div>
                      <div class="player-sub">${esc(p.gender || '')}${p.skill_level ? ' · ' + esc(p.skill_level) : ''}</div>
                    </div>
                  </div>
                </td>
                <td style="text-align:right;"><span class="points-display">${p._points}</span><span style="font-size:11px;color:var(--text-muted);font-weight:600;margin-left:2px;">pts</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;

    document.getElementById('standings-content').innerHTML = html;
  };

  const renderSessions = () => {
    if (!allMatches.length) {
      document.getElementById('sessions-content').innerHTML =
        '<div class="empty">No sessions recorded yet.</div>';
      return;
    }

    const grouped = {};
    allMatches.forEach((m) => {
      const key = `${m.session_date}__${m.court_group}`;
      if (!grouped[key]) grouped[key] = { date: m.session_date, group: m.court_group, games: {} };
      if (!grouped[key].games[m.game_number]) grouped[key].games[m.game_number] = [];
      grouped[key].games[m.game_number].push(m);
    });

    const completed = Object.values(grouped).filter((s) =>
      Object.values(s.games).flat().every((m) => m.default_no_show || m.score_for !== null)
    );

    if (!completed.length) {
      document.getElementById('sessions-content').innerHTML =
        '<div class="empty">No completed sessions yet.</div>';
      return;
    }

    const byDate = {};
    completed.forEach((s) => {
      if (!byDate[s.date]) byDate[s.date] = [];
      byDate[s.date].push(s);
    });
    const sortedDates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));

    let html = '';
    sortedDates.forEach((date, dateIdx) => {
      const courts     = byDate[date].sort((a, b) => a.group - b.group);
      const dateLabel  = fmtDate(date, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
      const courtCount = courts.length;
      const gameCount  = courts.reduce((n, s) => n + Object.keys(s.games).length, 0);
      const groupId    = `sdg-${date.replace(/-/g, '')}`;
      const isFirst    = dateIdx === 0;

      html += `<div class="session-block">
        <div class="session-date-header" onclick="toggleSessionDate('${groupId}')">
          <div class="session-date-chevron ${isFirst ? 'open' : ''}" id="${groupId}-chev">▶</div>
          <div class="session-date-info">
            <div class="session-date-label">📅 ${dateLabel}</div>
            <div class="session-date-sub">${courtCount} court${courtCount !== 1 ? 's' : ''} · ${gameCount} game${gameCount !== 1 ? 's' : ''}</div>
          </div>
        </div>
        <div class="session-date-body ${isFirst ? 'open' : ''}" id="${groupId}">`;

      courts.forEach((s) => {
        html += `<div class="session-court-label">Court ${s.group}</div>`;
        Object.entries(s.games)
          .sort((a, b) => a[0] - b[0])
          .forEach(([gnum, rows]) => {
            html += `<div class="game-row"><span class="game-label">Game ${gnum}</span>`;
            rows.forEach((r) => {
              const p     = ladderPlayers.find((x) => x.id === r.player_id);
              const name  = p ? `${p.first_name} ${p.last_name}` : 'Unknown';
              const score = r.score_for !== null ? `${r.score_for}–${r.score_against}` : '–';
              const pts   = r.default_no_show ? `${r.points_earned}pts` : `+${r.points_earned}pts`;
              const color = r.default_no_show ? 'var(--orange)' : r.points_earned <= 0 ? 'var(--text-muted)' : 'var(--teal)';
              const subTag = r.is_sub
                ? '<span class="badge-sub" style="margin-left:4px;">Sub</span>'
                : '';
              html += `<span style="margin-right:16px;font-weight:600;">${esc(name)}${subTag} <span style="color:${color};font-weight:800;">${score} / ${pts}</span></span>`;
            });
            html += '</div>';
          });
      });

      html += '</div></div>';
    });

    document.getElementById('sessions-content').innerHTML = html;
  };

  window.toggleSessionDate = (groupId) => {
    const body   = document.getElementById(groupId);
    const chev   = document.getElementById(`${groupId}-chev`);
    const isOpen = body.classList.contains('open');
    document.querySelectorAll('.session-date-body').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.session-date-chevron').forEach(el => { el.classList.remove('open'); el.style.transform = ''; });
    if (!isOpen) {
      body.classList.add('open');
      chev.classList.add('open');
      chev.style.transform = 'rotate(90deg)';
    }
  };

  const init = async () => {
    if (!ladderId) {
      document.querySelector('main').innerHTML = `
        <div class="error-screen">
          <div style="font-size:56px;margin-bottom:16px;">🏓</div>
          <h2>No ladder specified</h2>
          <p>Please use the link provided by your organizer.</p>
        </div>`;
      return;
    }

    try {
      const ladders = await api(`ladders?id=eq.${ladderId}&select=*`);
      if (!ladders.length) {
        document.querySelector('main').innerHTML =
          '<div class="error-screen"><h2>Ladder not found</h2><p>This ladder does not exist.</p></div>';
        return;
      }
      ladderData = ladders[0];
      document.getElementById('ladder-name').textContent = ladderData.name;
      document.title = `${ladderData.name} — Ferocia Pickleball`;

      const enrolled   = await api(`ladder_players?select=player_id,status&ladder_id=eq.${ladderId}`);
      const playerIds  = enrolled.map((r) => r.player_id);
      if (!playerIds.length) {
        document.getElementById('standings-content').innerHTML =
          '<div class="empty">No players enrolled in this ladder yet.</div>';
        return;
      }

      const [players, matches] = await Promise.all([
        api(`public_players?id=in.(${playerIds.join(',')})&select=*&order=first_name`),
        api(`matches?ladder_id=eq.${ladderId}&select=*`),
      ]);

      ladderPlayers = players.map((p) => {
        const row = enrolled.find((r) => r.player_id === p.id);
        return { ...p, ladder_status: row?.status || 'active' };
      });
      allMatches = matches;

      renderStandings();
      renderSessions();
    } catch (e) {
      document.querySelector('main').innerHTML = `
        <div class="error-screen">
          <h2>Error loading data</h2>
          <p>${esc(e.message)}</p>
        </div>`;
    }
  };

  init();
})();
</script>
</body>
</html>
