<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferocia Sports Center — Player Portal</title>
  <!-- Open Graph / WhatsApp / iMessage / Social preview -->
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="Ferocia Sports Center">
  <meta property="og:title"       content="Ladder Standings — Ferocia Sports Center">
  <meta property="og:description" content="View current pickleball ladder standings, player rankings and session results at Ferocia Sports Center.">
  <meta property="og:image"       content="https://ferociasports.com/og-preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height"content="630">
  <meta property="og:url"         content="https://ferociasports.com/players.html">
  <meta name="twitter:card"       content="summary_large_image">
  <meta name="twitter:title"      content="Ladder Standings — Ferocia Sports Center">
  <meta name="twitter:description"content="View current pickleball ladder standings, player rankings and session results at Ferocia Sports Center.">
  <meta name="twitter:image"      content="https://ferociasports.com/og-preview.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db.js"></script>
<script src="assets.js"></script>
<style>
  :root {
    --blue:#174CCC; --blue-light:#9CE3FF; --blue-pale:#e8f0ff;
    --teal:#24BC96; --teal-light:#d4f5ed;
    --lime:#C6F221; --lime-dark:#7a9200;
    --orange:#F26024; --orange-light:#fde8d8;
    --gray:#EFEFEF; --gray-dk:#888;
    --white:#ffffff; --text:#0d1f4a; --text-muted:#6b7a99;
    --border:#d6dff5; --bg:#f4f6fc;
    --gold:#FFD700; --silver:#C0C0C0; --bronze:#CD7F32;
    --radius:12px; --radius-sm:6px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Montserrat',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }

  /* HEADER */
  header { background:var(--blue); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:68px; border-bottom:3px solid var(--lime); }
  .header-left { display:flex; flex-direction:column; justify-content:center; gap:4px; }
  .header-logo { height:32px; max-width:140px; width:auto; object-fit:contain; display:block; }
  .header-tagline { font-size:11px; font-weight:800; letter-spacing:4px; text-transform:uppercase; color:var(--lime); padding-left:2px; }
  .ladder-pill { font-size:11px; font-weight:700; color:var(--blue-light); background:rgba(255,255,255,0.1); padding:4px 12px; border-radius:99px; }

  /* NAV TABS */
  nav { background:var(--white); border-bottom:0.5px solid var(--border); display:flex; padding:0 24px; }
  nav button { background:none; border:none; padding:14px 16px; font-size:11px; font-family:'Montserrat',sans-serif; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--text-muted); cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; transition:color .15s; }
  nav button.active { color:var(--blue); border-bottom-color:var(--lime); }

  main { max-width:960px; margin:0 auto; padding:24px 16px; }
  .page { display:none; } .page.active { display:block; }

  /* PODIUM SECTION */
  .podium-section { margin-bottom:32px; }
  .podium-title { font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:16px; display:flex; align-items:center; gap:10px; }
  .podium-title::after { content:''; flex:1; height:1px; background:var(--border); }

  .podium { display:flex; justify-content:center; align-items:flex-end; gap:12px; margin-bottom:12px; }
  .podium-slot { display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; max-width:160px; }
  .podium-avatar { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:900; color:white; margin-bottom:4px; position:relative; }
  .podium-avatar.gold { background:linear-gradient(135deg,#FFD700,#FFA500); box-shadow:0 4px 16px rgba(255,215,0,0.5); }
  .podium-avatar.silver { background:linear-gradient(135deg,#C0C0C0,#A8A8A8); box-shadow:0 4px 16px rgba(192,192,192,0.4); }
  .podium-avatar.bronze { background:linear-gradient(135deg,#CD7F32,#A0522D); box-shadow:0 4px 16px rgba(205,127,50,0.4); }
  .podium-crown { position:absolute; top:-14px; font-size:18px; }
  .podium-name { font-size:12px; font-weight:800; text-align:center; line-height:1.2; color:var(--text); }
  .podium-pts { font-size:11px; font-weight:700; color:var(--text-muted); }
  .podium-bar { width:100%; border-radius:8px 8px 0 0; display:flex; align-items:center; justify-content:center; }
  .podium-bar.gold { background:linear-gradient(180deg,rgba(255,215,0,0.2),rgba(255,215,0,0.05)); border:1.5px solid rgba(255,215,0,0.4); height:80px; }
  .podium-bar.silver { background:linear-gradient(180deg,rgba(192,192,192,0.2),rgba(192,192,192,0.05)); border:1.5px solid rgba(192,192,192,0.4); height:60px; }
  .podium-bar.bronze { background:linear-gradient(180deg,rgba(205,127,50,0.2),rgba(205,127,50,0.05)); border:1.5px solid rgba(205,127,50,0.3); height:44px; }
  .podium-bar .medal { font-size:22px; }

  /* STANDINGS TABLE */
  .card { background:var(--white); border:0.5px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
  .card-title { font-size:11px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); margin-bottom:16px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:8px 12px; font-size:10px; font-weight:800; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; border-bottom:0.5px solid var(--border); }
  td { padding:11px 12px; border-bottom:0.5px solid var(--border); }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--bg); }
  .rank-badge { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:50%; font-size:12px; font-weight:800; background:var(--gray); color:var(--gray-dk); }
  .rank-badge.top1 { background:var(--gold); color:#7a5800; }
  .rank-badge.top2 { background:var(--silver); color:#555; }
  .rank-badge.top3 { background:var(--bronze); color:#fff; }
  .points-pill { display:inline-block; font-size:12px; font-weight:700; padding:3px 10px; border-radius:99px; background:var(--blue-pale); color:var(--blue); }
  .badge { display:inline-block; font-size:10px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; padding:3px 9px; border-radius:99px; }
  .badge-sub { background:var(--orange-light); color:var(--orange); }

  /* GENDER FILTER */
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .section-header h2 { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); }
  .filter-select { font-size:12px; padding:5px 10px; font-family:'Montserrat',sans-serif; font-weight:600; border:0.5px solid var(--border); border-radius:var(--radius-sm); }

  /* SESSIONS */
  .session-block { margin-bottom:12px; border:0.5px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; background:var(--white); }
  .session-date-header { display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; background:var(--blue-pale); user-select:none; }
  .session-date-header:hover { filter:brightness(.97); }
  .session-date-chevron { font-size:11px; color:var(--blue); font-weight:800; transition:transform .2s; display:inline-block; }
  .session-date-chevron.open { transform:rotate(90deg); }
  .session-date-info { flex:1; }
  .session-date-label { font-size:13px; font-weight:800; color:var(--blue); }
  .session-date-sub { font-size:11px; font-weight:600; color:var(--text-muted); margin-top:2px; }
  .session-date-body { display:none; padding:12px 16px; }
  .session-date-body.open { display:block; }
  .session-court-label { font-size:11px; font-weight:800; color:var(--blue); text-transform:uppercase; letter-spacing:1px; margin:10px 0 6px; }
  .session-court-label:first-child { margin-top:0; }
  .game-row { margin-bottom:6px; padding:10px 12px; background:var(--bg); border-radius:var(--radius-sm); font-size:13px; border-left:3px solid var(--lime); }
  .game-label { font-weight:800; color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin-right:10px; }

  /* LOADING / EMPTY */
  .loading,.empty { text-align:center; padding:36px 16px; color:var(--text-muted); font-weight:600; font-size:13px; }
  .error-screen { text-align:center; padding:80px 24px; }
  .error-screen h2 { font-size:18px; margin:8px 0; color:var(--orange); }
  .error-screen p { color:var(--text-muted); font-weight:500; }

  /* FOOTER */
  footer { padding:20px 24px; display:flex; align-items:center; justify-content:center; gap:10px; }
  .footer-tag { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); }
  .footer-logo { height:26px; width:auto; }

  @media(max-width:600px) {
    main { padding:16px 12px; }
    .podium { gap:8px; }
    .podium-avatar { width:44px; height:44px; font-size:16px; }
    .podium-bar.gold { height:64px; }
    .podium-bar.silver { height:48px; }
    .podium-bar.bronze { height:36px; }
    .header-logo { height:24px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <img class="header-logo" data-asset="ferociaLogo" alt="Ferocia">
    <div class="header-tagline">Sports Center — Player Portal</div>
  </div>
  <span class="ladder-pill" id="ladder-name">Loading...</span>
</header>

<nav>
  <button class="active" id="tab-standings" data-tab="standings">🏆 Standings</button>
  <button id="tab-sessions" data-tab="sessions">📋 Sessions</button>
</nav>

<main>
  <div id="page-standings" class="page active">
    <div id="standings-content"><div class="loading">Loading standings...</div></div>
  </div>
  <div id="page-sessions" class="page">
    <div class="card">
      <div class="card-title">Session History</div>
      <div id="sessions-content"><div class="loading">Loading sessions...</div></div>
    </div>
  </div>
</main>

<footer>
  <span class="footer-tag">Brought to you by</span>
  <img class="footer-logo" data-asset="ferociaLogoBlue" alt="Ferocia Sports">
</footer>

<script>
(function () {
  'use strict';

  // Shared helpers from db.js (api, esc, fmtDate) and config.js (FEROCIA_CONFIG)
  // are already on window.

  // Decode ladder ID from URL: ?l=BASE64_ID
  const params = new URLSearchParams(window.location.search);
  const encoded = params.get('l');
  let ladderId = null;
  try {
    ladderId = encoded ? atob(encoded) : null;
  } catch (_) {
    ladderId = null;
  }

  let ladderData = null;
  let allMatches = [];
  let ladderPlayers = [];
  let currentGenderFilter = 'all';

  // Tab navigation — click delegation, no inline onclick
  document.querySelectorAll('nav button[data-tab]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.tab;
      document.querySelectorAll('.page').forEach((p) => p.classList.remove('active'));
      document.querySelectorAll('nav button').forEach((b) => b.classList.remove('active'));
      document.getElementById(`page-${name}`).classList.add('active');
      btn.classList.add('active');
    });
  });

  // Gender filter — change delegation
  document.addEventListener('change', (e) => {
    if (e.target && e.target.id === 'gender-filter') {
      currentGenderFilter = e.target.value;
      renderStandings();
    }
  });

  const getInitials = (first, last) =>
    ((first || '')[0] || '').toUpperCase() + ((last || '')[0] || '').toUpperCase();

  const calcPlayerPoints = () => {
    const pm = {};
    ladderPlayers.forEach((p) => (pm[p.id] = 0));
    allMatches.forEach((m) => {
      if (pm[m.player_id] !== undefined) pm[m.player_id] += m.points_earned || 0;
    });
    return pm;
  };

  const renderPodium = (players, label) => {
    const medals = ['gold', 'silver', 'bronze'];
    const crowns = ['👑', '🥈', '🥉'];
    const top = players.slice(0, 3);
    // Visual order: 2nd, 1st, 3rd
    const order = top.length === 1 ? [0] : top.length === 2 ? [1, 0] : [1, 0, 2];

    return `
      <div class="podium-section">
        <div class="podium-title">${label === 'Men' ? '🏆 Top Men' : '🏆 Top Women'}</div>
        <div class="podium">
          ${order
            .map((idx) => {
              if (idx >= top.length) return '';
              const p = top[idx];
              const medal = medals[idx];
              const crown = crowns[idx];
              return `
                <div class="podium-slot">
                  <div class="podium-avatar ${medal}">
                    ${esc(getInitials(p.first_name, p.last_name))}
                    <span class="podium-crown">${idx === 0 ? crown : ''}</span>
                  </div>
                  <div class="podium-name">${esc(p.first_name)}<br>${esc(p.last_name)}</div>
                  <div class="podium-pts">${p._points} pts</div>
                  <div class="podium-bar ${medal}"><span class="medal">${idx === 0 ? '🥇' : idx === 1 ? '🥈' : '🥉'}</span></div>
                </div>`;
            })
            .join('')}
        </div>
      </div>`;
  };

  const renderStandings = () => {
    const pm = calcPlayerPoints();
    const active = ladderPlayers.filter((p) => p.ladder_status === 'active');
    active.sort((a, b) => (pm[b.id] || 0) - (pm[a.id] || 0));
    active.forEach((p, i) => {
      p._rank = i + 1;
      p._points = pm[p.id] || 0;
    });

    const men = active.filter((p) => p.gender === 'Male');
    const women = active.filter((p) => p.gender === 'Female');

    let html = '';
    if (men.length) html += renderPodium(men, 'Men');
    if (women.length) html += renderPodium(women, 'Women');

    const filtered = active.filter(
      (p) => currentGenderFilter === 'all' || p.gender === currentGenderFilter,
    );
    html += `
      <div class="card">
        <div class="section-header">
          <h2>Full standings</h2>
          <select class="filter-select" id="gender-filter">
            <option value="all" ${currentGenderFilter === 'all' ? 'selected' : ''}>All players</option>
            <option value="Male" ${currentGenderFilter === 'Male' ? 'selected' : ''}>Men</option>
            <option value="Female" ${currentGenderFilter === 'Female' ? 'selected' : ''}>Women</option>
          </select>
        </div>
        <table>
          <thead><tr><th>Rank</th><th>Player</th><th>Points</th></tr></thead>
          <tbody>
            ${filtered
              .map((p, i) => {
                const rank = currentGenderFilter === 'all' ? i + 1 : p._rank;
                const rc = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
                return `<tr>
                  <td><span class="rank-badge ${rc}">${rank}</span></td>
                  <td style="font-weight:700">${esc(p.first_name)} ${esc(p.last_name)}</td>
                  <td><span class="points-pill">${p._points} pts</span></td>
                </tr>`;
              })
              .join('')}
          </tbody>
        </table>
      </div>`;

    document.getElementById('standings-content').innerHTML = html;
  };

  const renderSessions = () => {
    if (!allMatches.length) {
      document.getElementById('sessions-content').innerHTML =
        '<div class="empty">No sessions recorded yet.</div>';
      return;
    }

    // Group by court (date__court_group)
    const grouped = {};
    allMatches.forEach((m) => {
      const key = `${m.session_date}__${m.court_group}`;
      if (!grouped[key]) grouped[key] = { date: m.session_date, group: m.court_group, games: {} };
      if (!grouped[key].games[m.game_number]) grouped[key].games[m.game_number] = [];
      grouped[key].games[m.game_number].push(m);
    });

    // Only show courts where ALL non-no-show games have scores recorded
    const completed = Object.values(grouped).filter((s) =>
      Object.values(s.games).flat().every((m) => m.default_no_show || m.score_for !== null)
    );

    if (!completed.length) {
      document.getElementById('sessions-content').innerHTML =
        '<div class="empty">No completed sessions yet.</div>';
      return;
    }

    // Group courts by date — most recent first
    const byDate = {};
    completed.forEach((s) => {
      if (!byDate[s.date]) byDate[s.date] = [];
      byDate[s.date].push(s);
    });
    const sortedDates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));

    let html = '';
    sortedDates.forEach((date, dateIdx) => {
      const courts = byDate[date].sort((a, b) => a.group - b.group);
      const dateLabel = fmtDate(date, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
      const courtCount = courts.length;
      const gameCount  = courts.reduce((n, s) => n + Object.keys(s.games).length, 0);
      const groupId    = `sdg-${date.replace(/-/g, '')}`;
      const isFirst    = dateIdx === 0;

      html += `<div class="session-block">
        <div class="session-date-header" onclick="toggleSessionDate('${groupId}')">
          <span class="session-date-chevron ${isFirst ? 'open' : ''}" id="${groupId}-chev">▶</span>
          <div class="session-date-info">
            <div class="session-date-label">📅 ${dateLabel}</div>
            <div class="session-date-sub">${courtCount} court${courtCount !== 1 ? 's' : ''} · ${gameCount} games</div>
          </div>
        </div>
        <div class="session-date-body ${isFirst ? 'open' : ''}" id="${groupId}">`;

      courts.forEach((s) => {
        html += `<div class="session-court-label">Court ${s.group}</div>`;
        Object.entries(s.games)
          .sort((a, b) => a[0] - b[0])
          .forEach(([gnum, rows]) => {
            html += `<div class="game-row"><span class="game-label">Game ${gnum}</span>`;
            rows.forEach((r) => {
              const p = ladderPlayers.find((x) => x.id === r.player_id);
              const name = p ? `${p.first_name} ${p.last_name}` : 'Unknown';
              const score = r.score_for !== null ? `${r.score_for}-${r.score_against}` : '–';
              const pts = r.default_no_show ? `${r.points_earned}pts` : `+${r.points_earned}pts`;
              const color = r.default_no_show
                ? 'var(--orange)'
                : r.points_earned <= 0
                  ? 'var(--text-muted)'
                  : 'var(--teal)';
              const subTag = r.is_sub
                ? '<span class="badge badge-sub" style="margin-left:4px;">Sub</span>'
                : '';
              html += `<span style="margin-right:12px;font-weight:500">${esc(name)}${subTag} <span style="color:${color};font-weight:700">${score} / ${pts}</span></span>`;
            });
            html += '</div>';
          });
      });

      html += '</div></div>'; // session-date-body + session-block
    });

    document.getElementById('sessions-content').innerHTML = html;
  };

  // Accordion toggle — one date open at a time
  window.toggleSessionDate = (groupId) => {
    const body  = document.getElementById(groupId);
    const chev  = document.getElementById(`${groupId}-chev`);
    const isOpen = body.classList.contains('open');

    // Close all
    document.querySelectorAll('.session-date-body').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.session-date-chevron').forEach(el => { el.classList.remove('open'); el.style.transform = ''; });

    // Open clicked if it was closed
    if (!isOpen) {
      body.classList.add('open');
      chev.classList.add('open');
      chev.style.transform = 'rotate(90deg)';
    }
  };

  const init = async () => {
    if (!ladderId) {
      document.querySelector('main').innerHTML = `
        <div class="error-screen">
          <div style="font-size:48px;margin-bottom:16px;">🏓</div>
          <h2>No ladder specified</h2>
          <p>Please use the link provided by your organizer.</p>
        </div>`;
      return;
    }

    try {
      // Load ladder info
      const ladders = await api(`ladders?id=eq.${ladderId}&select=*`);
      if (!ladders.length) {
        document.querySelector('main').innerHTML =
          '<div class="error-screen"><h2>Ladder not found</h2><p>This ladder does not exist.</p></div>';
        return;
      }
      ladderData = ladders[0];
      // Use textContent (not innerHTML) so even unsanitized input is safe
      document.getElementById('ladder-name').textContent = ladderData.name;
      document.title = `${ladderData.name} — Ferocia Pickleball`;

      // Load enrolled players with ladder status
      const enrolled = await api(`ladder_players?select=player_id,status&ladder_id=eq.${ladderId}`);
      const playerIds = enrolled.map((r) => r.player_id);
      if (!playerIds.length) {
        document.getElementById('standings-content').innerHTML =
          '<div class="empty">No players enrolled in this ladder yet.</div>';
        return;
      }

      // Parallel fetch: players (public view, hides email/phone) + all matches
      const [players, matches] = await Promise.all([
        api(`public_players?id=in.(${playerIds.join(',')})&select=*&order=first_name`),
        api(`matches?ladder_id=eq.${ladderId}&select=*`),
      ]);

      ladderPlayers = players.map((p) => {
        const row = enrolled.find((r) => r.player_id === p.id);
        return { ...p, ladder_status: row?.status || 'active' };
      });
      allMatches = matches;

      renderStandings();
      renderSessions();
    } catch (e) {
      document.querySelector('main').innerHTML = `
        <div class="error-screen">
          <h2>Error loading data</h2>
          <p>${esc(e.message)}</p>
        </div>`;
    }
  };

  init();
})();
</script>
</body>
</html>
