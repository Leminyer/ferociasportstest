<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferocia Sports Center — Tournament Results</title>
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="Ferocia Sports Center">
  <meta property="og:title"       content="Tournament Results — Ferocia Sports Center">
  <meta property="og:description" content="Live tournament standings, bracket results and match scores for Ferocia Sports Center pickleball tournaments.">
  <meta property="og:image"       content="https://ferociasports.com/og-preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height"content="630">
  <meta property="og:url"         content="https://ferociasports.com/tournament-results.html">
  <meta name="twitter:card"       content="summary_large_image">
  <meta name="twitter:title"      content="Tournament Results — Ferocia Sports Center">
  <meta name="twitter:description"content="Live tournament standings, bracket results and match scores for Ferocia Sports Center pickleball tournaments.">
  <meta name="twitter:image"      content="https://ferociasports.com/og-preview.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db.js"></script>
<script src="assets.js"></script>
<style>
  :root {
    --blue:#174CCC; --blue-light:#9CE3FF; --blue-pale:#e8f0ff;
    --teal:#24BC96; --teal-light:#d4f5ed;
    --lime:#C6F221; --lime-dark:#7a9200;
    --orange:#F26024; --orange-light:#fde8d8;
    --gray:#EFEFEF; --gray-dk:#888;
    --white:#ffffff; --text:#0d1f4a; --text-muted:#6b7a99;
    --border:#d6dff5; --bg:#f0f2f8;
    --gold:#FFD700; --silver:#C0C0C0; --bronze:#CD7F32;
    --radius:14px; --radius-sm:8px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Montserrat',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }

  /* ── HEADER ─────────────────────────────────────────── */
  header {
    background:#080f2e;
    padding:0 28px;
    display:flex; align-items:center; justify-content:space-between;
    height:68px; border-bottom:3px solid var(--lime);
    position:sticky; top:0; z-index:100;
  }
  .header-left { display:flex; align-items:center; gap:16px; }
  .header-logo { height:30px; max-width:140px; width:auto; object-fit:contain; display:block; }
  .header-divider { width:1px; height:24px; background:rgba(255,255,255,0.12); }
  .header-tagline { font-size:10px; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.4); }
  .tournament-pill {
    font-size:11px; font-weight:700; color:var(--blue-light);
    background:rgba(156,227,255,0.12); padding:6px 14px;
    border-radius:99px; border:1px solid rgba(156,227,255,0.2);
    text-align:right; max-width:360px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  /* ── CATEGORY BAR ────────────────────────────────────── */
  .category-bar {
    background:var(--white);
    border-bottom:0.5px solid var(--border);
    padding:14px 28px;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    position:sticky; top:68px; z-index:99;
    box-shadow:0 2px 8px rgba(23,76,204,0.06);
  }
  .category-bar label {
    font-size:10px; font-weight:800; text-transform:uppercase;
    letter-spacing:2px; color:var(--text-muted); white-space:nowrap;
  }
  .category-select {
    font-family:'Montserrat',sans-serif; font-size:13px; font-weight:700;
    color:var(--text); background:var(--bg);
    border:0.5px solid var(--border); border-radius:99px;
    padding:8px 16px; cursor:pointer; outline:none;
    min-width:200px; flex:1; max-width:420px;
    transition:border-color .15s;
  }
  .category-select:focus { border-color:var(--blue); }

  /* ── LAYOUT ──────────────────────────────────────────── */
  main { max-width:960px; margin:0 auto; padding:32px 20px 48px; }

  /* ── STATUS BANNER ───────────────────────────────────── */
  .status-banner {
    display:inline-flex; align-items:center; gap:8px;
    font-size:11px; font-weight:800; letter-spacing:1px;
    text-transform:uppercase; padding:7px 16px;
    border-radius:99px; margin-bottom:24px;
  }
  .status-banner.draft     { background:#f0f0f0; color:var(--gray-dk); }
  .status-banner.active    { background:var(--teal-light); color:var(--teal); }
  .status-banner.completed { background:var(--blue-pale); color:var(--blue); }

  /* ── PODIUM — identical to players.html ─────────────── */
  .podium-section {
    background:var(--white); border:0.5px solid var(--border);
    border-radius:var(--radius); padding:24px 20px 0;
    box-shadow:0 2px 12px rgba(23,76,204,0.05); margin-bottom:24px;
  }
  .podium { display:flex; justify-content:center; align-items:flex-end; gap:16px; margin-bottom:16px; }
  .podium-slot { display:flex; flex-direction:column; align-items:center; gap:8px; flex:1; max-width:180px; }
  .podium-crown { position:absolute; top:-16px; font-size:20px; }
  .podium-avatar {
    width:64px; height:64px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size:14px; color:white;
    position:relative; text-align:center; padding:6px; line-height:1.2;
    word-break:break-word; overflow:hidden;
  }
  .podium-avatar.gold   { background:linear-gradient(135deg,#FFD700,#FFA500); box-shadow:0 8px 24px rgba(255,180,0,0.4); }
  .podium-avatar.silver { background:linear-gradient(135deg,#C0C0C0,#A8A8A8); box-shadow:0 8px 24px rgba(192,192,192,0.35); }
  .podium-avatar.bronze { background:linear-gradient(135deg,#CD7F32,#A0522D); box-shadow:0 8px 24px rgba(180,100,30,0.35); }
  /* Team name — same as players.html podium-name */
  .podium-name { font-size:13px; font-weight:800; text-align:center; line-height:1.3; color:var(--text); }
  /* Player names stacked — same as players.html podium-name */
  .podium-player-name { font-size:13px; font-weight:800; text-align:center; line-height:1.3; color:var(--text-muted); }
  /* Label (Champion / 2nd Place / 3rd Place) — Bebas Neue like players.html podium-pts */
  .podium-label { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--blue); text-align:center; }
  .podium-bar { width:100%; border-radius:10px 10px 0 0; display:flex; align-items:center; justify-content:center; }
  .bar-gold   { background:rgba(255,215,0,0.12); border:1.5px solid rgba(255,215,0,0.35); border-bottom:none; height:88px; }
  .bar-silver { background:rgba(192,192,192,0.12); border:1.5px solid rgba(192,192,192,0.35); border-bottom:none; height:64px; }
  .bar-bronze { background:rgba(205,127,50,0.12); border:1.5px solid rgba(205,127,50,0.3); border-bottom:none; height:48px; }
  .podium-bar .medal { font-size:26px; }

  /* ── CARDS ───────────────────────────────────────────── */
  .card {
    background:var(--white); border:0.5px solid var(--border);
    border-radius:var(--radius); padding:24px; margin-bottom:20px;
    box-shadow:0 2px 12px rgba(23,76,204,0.05);
  }
  .card-title {
    font-size:11px; font-weight:800; letter-spacing:2px;
    text-transform:uppercase; color:var(--text-muted); margin-bottom:20px;
  }

  /* ── PHASE / SECTION LABELS ──────────────────────────── */
  .phase-label {
    font-size:10px; font-weight:800; letter-spacing:2px;
    text-transform:uppercase; color:var(--text-muted);
    margin:28px 0 12px; padding-bottom:8px;
    border-bottom:0.5px solid var(--border);
    display:flex; align-items:center; gap:10px;
  }
  .phase-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .section-label {
    font-size:10px; font-weight:800; letter-spacing:2px;
    text-transform:uppercase; color:var(--text-muted);
    margin-bottom:12px;
  }

  /* ── STANDINGS TABLE ─────────────────────────────────── */
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th {
    text-align:left; padding:10px 14px;
    font-size:10px; font-weight:800; color:var(--text-muted);
    text-transform:uppercase; letter-spacing:1px;
    border-bottom:1.5px solid var(--border);
  }
  td { padding:13px 14px; border-bottom:0.5px solid var(--border); }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#f8f9ff; }

  .rank-num {
    font-family:'Bebas Neue',sans-serif; font-size:24px;
    color:var(--text-muted); min-width:28px; display:inline-block; text-align:center;
  }
  .rank-num.top1 { color:#c8920a; }
  .rank-num.top2 { color:#888; }
  .rank-num.top3 { color:#9e6229; }

  .stat-win  { color:var(--teal); font-weight:800; font-size:14px; }
  .stat-loss { color:var(--orange); font-weight:800; font-size:14px; }
  .stat-diff-pos { color:var(--teal); font-weight:700; }
  .stat-diff-neg { color:var(--orange); font-weight:700; }

  /* ── BRACKET ─────────────────────────────────────────── */
  .bracket-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:8px; }
  .bracket { display:flex; gap:20px; align-items:flex-start; min-width:min-content; }
  .bracket-col { display:flex; flex-direction:column; gap:14px; min-width:200px; }
  .bracket-col-title {
    font-size:10px; font-weight:800; text-transform:uppercase;
    letter-spacing:1.5px; color:var(--blue);
    text-align:center; padding-bottom:10px;
    border-bottom:2px solid var(--blue-pale); margin-bottom:4px;
  }
  .bracket-match {
    background:var(--white); border:0.5px solid var(--border);
    border-radius:var(--radius-sm); overflow:hidden;
    box-shadow:0 1px 4px rgba(23,76,204,0.05);
  }
  .bracket-team {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; font-size:12px; gap:8px;
  }
  .bracket-team:first-child { border-bottom:0.5px solid var(--border); }
  .bracket-team.winner { background:var(--blue-pale); font-weight:800; color:var(--blue); border-left:3px solid var(--lime); }
  .bracket-team.bye    { color:var(--text-muted); font-style:italic; }
  .bracket-score { font-family:'Bebas Neue',sans-serif; font-size:20px; flex-shrink:0; color:var(--blue); }
  .bracket-team.winner .bracket-score { color:var(--lime-dark); }
  .bracket-team-name    { font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bracket-team-players { font-size:10px; font-weight:500; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px; }

  /* ── GROUP BLOCKS ────────────────────────────────────── */
  .group-block {
    background:var(--white); border:0.5px solid var(--border);
    border-radius:var(--radius-sm); padding:18px; margin-bottom:16px;
    box-shadow:0 1px 6px rgba(23,76,204,0.04);
  }
  .group-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; padding-bottom:12px; border-bottom:0.5px solid var(--border); }
  .group-badge {
    display:inline-block; font-size:11px; font-weight:800;
    letter-spacing:1px; text-transform:uppercase;
    color:#fff; background:var(--blue); padding:5px 12px; border-radius:99px;
  }

  /* ── RR MATCHES ──────────────────────────────────────── */
  .rr-rounds { margin-top:20px; }
  .rr-round-label {
    font-size:10px; font-weight:800; letter-spacing:1.5px;
    text-transform:uppercase; color:#fff; background:var(--blue);
    padding:5px 12px; border-radius:99px;
    display:inline-block; margin:14px 0 10px;
  }
  .rr-match-row {
    display:flex; align-items:center; gap:10px;
    padding:10px 14px; background:var(--bg);
    border:0.5px solid var(--border); border-radius:var(--radius-sm);
    margin-bottom:8px; transition:background .15s;
  }
  .rr-match-row:hover { background:var(--blue-pale); }
  .rr-court-badge {
    font-size:10px; font-weight:800; color:var(--teal);
    background:var(--teal-light); padding:4px 10px;
    border-radius:99px; flex-shrink:0; white-space:nowrap;
  }
  .rr-team-block   { flex:1; min-width:0; }
  .rr-team-name    { font-size:13px; font-weight:800; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rr-team-players { font-size:11px; font-weight:500; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rr-vs           { font-size:10px; font-weight:800; color:var(--text-muted); flex-shrink:0; padding:0 4px; }
  .rr-score-block  { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .rr-score        { font-family:'Bebas Neue',sans-serif; font-size:22px; min-width:24px; text-align:center; }
  .rr-score.winner  { color:var(--teal); }
  .rr-score.loser   { color:var(--orange); }
  .rr-score.pending { color:var(--text-muted); font-size:12px; font-family:'Montserrat',sans-serif; }
  .rr-score-sep    { font-size:13px; font-weight:700; color:var(--border); }

  /* ── TEAMS GRID ──────────────────────────────────────── */
  .teams-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; margin-bottom:8px; }
  .team-card {
    background:var(--white); border:0.5px solid var(--border);
    border-radius:var(--radius-sm); padding:14px 16px;
    display:flex; align-items:center; gap:14px;
    transition:box-shadow .15s, border-color .15s;
  }
  .team-card:hover { box-shadow:0 4px 16px rgba(23,76,204,.1); border-color:var(--blue); }
  .team-seed {
    width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size:18px; flex-shrink:0;
    background:var(--blue-pale); color:var(--blue);
  }
  .team-seed.s1 { background:rgba(255,215,0,0.2); color:#9a6e00; }
  .team-seed.s2 { background:rgba(192,192,192,0.2); color:#555; }
  .team-seed.s3 { background:rgba(205,127,50,0.2); color:#7a3d00; }
  .team-info    { min-width:0; }
  .team-name    { font-size:13px; font-weight:800; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .team-players { font-size:11px; font-weight:600; color:var(--text-muted); margin-top:3px; line-height:1.4; }

  /* ── EMPTY / LOADING / ERROR ─────────────────────────── */
  .empty   { text-align:center; color:var(--text-muted); font-size:13px; font-weight:600; padding:40px 0; }
  .loading { text-align:center; color:var(--text-muted); font-size:13px; font-weight:600; padding:48px 0; }
  .error   { color:var(--orange); font-size:13px; font-weight:600; padding:32px; text-align:center; }

  /* ── FOOTER ──────────────────────────────────────────── */
  footer {
    text-align:center; padding:28px 16px; margin-top:8px;
    border-top:3px solid var(--lime); background:#080f2e;
  }
  .footer-tag  { display:block; font-size:9px; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:rgba(156,227,255,0.5); margin-bottom:10px; }
  .footer-logo { height:26px; width:auto; }

  /* ── MOBILE ──────────────────────────────────────────── */
  @media (max-width:600px) {
    header { padding:0 16px; height:60px; }
    .header-tagline { display:none; }
    .header-divider  { display:none; }
    .category-bar { padding:10px 16px; top:60px; }
    .category-select { min-width:0; }
    .podium { gap:8px; }
    .podium-avatar { width:52px; height:52px; font-size:11px; }
    .bar-gold { height:72px; } .bar-silver { height:52px; } .bar-bronze { height:40px; }
    main { padding:20px 14px 48px; }
    .bracket-col { min-width:160px; }
    .bracket-team { font-size:11px; padding:8px 10px; }
    .card { padding:18px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <img class="header-logo" data-asset="ferociaLogo" alt="Ferocia Sports">
    <div class="header-divider"></div>
    <div class="header-tagline">Tournament Results</div>
  </div>
  <div class="tournament-pill" id="tournament-pill">Loading...</div>
</header>

<div class="category-bar" id="category-bar" style="display:none;">
  <label for="category-select">Category</label>
  <select class="category-select" id="category-select"></select>
</div>

<main id="main-content">
  <div class="loading">Loading tournament results...</div>
</main>

<footer>
  <span class="footer-tag">Brought to you by</span>
  <img class="footer-logo" data-asset="ferociaLogo" alt="Ferocia Sports">
</footer>

<script>
(async () => {
  'use strict';

  const params = new URLSearchParams(window.location.search);
  const encoded = params.get('t');
  if (!encoded) {
    document.getElementById('main-content').innerHTML =
      '<div class="error">No tournament specified.<br>Please use the link provided by Ferocia Sports Center.</div>';
    return;
  }

  let tournamentId;
  try {
    tournamentId = parseInt(atob(encoded), 10);
    if (!tournamentId || isNaN(tournamentId)) throw new Error('Invalid ID');
  } catch {
    document.getElementById('main-content').innerHTML =
      '<div class="error">Invalid tournament link. Please use the link provided by Ferocia Sports Center.</div>';
    return;
  }

  const esc = window.escapeHtml || ((s) => s == null ? '' : String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;'));

  let tournament, categories, allTeams, allRR, allBracket, allGroups;
  try {
    [tournament] = await api(`tournaments?id=eq.${tournamentId}&select=*`);
    if (!tournament) throw new Error('Tournament not found');
    categories = await api(`tournament_categories?tournament_id=eq.${tournamentId}&select=*&order=id`);
    if (!categories.length) throw new Error('No categories found');
    const catIds = categories.map(c => c.id).join(',');
    [allTeams, allRR, allBracket, allGroups] = await Promise.all([
      api(`tournament_teams?category_id=in.(${catIds})&select=*&order=id`),
      api(`tournament_rr_matches?category_id=in.(${catIds})&select=*&order=round,court`),
      api(`tournament_bracket_matches?category_id=in.(${catIds})&select=*&order=id`),
      api(`tournament_groups?category_id=in.(${catIds})&select=*&order=position`),
    ]);
  } catch (err) {
    document.getElementById('main-content').innerHTML =
      `<div class="error">Error loading tournament: ${esc(err.message)}</div>`;
    return;
  }

  const allPlayerIds = [...new Set(
    allTeams.flatMap(t => [t.player1_id,t.player2_id,t.player3_id,t.player4_id].filter(Boolean))
  )];
  let playerMap = {};
  if (allPlayerIds.length) {
    try {
      const players = await api(`public_players?id=in.(${allPlayerIds.join(',')})&select=id,first_name,last_name`);
      players.forEach(p => { playerMap[p.id] = p; });
    } catch (_) {}
  }
  function getPlayerNames(team) {
    const ids = [team.player1_id,team.player2_id,team.player3_id,team.player4_id].filter(Boolean);
    const names = ids.map(id => { const p=playerMap[id]; return p?`${p.first_name} ${p.last_name}`:null; }).filter(Boolean);
    return names.length > 1 ? names.join(' & ') : '';
  }

  document.title = `${tournament.name} — Ferocia Sports Center`;
  document.getElementById('tournament-pill').textContent = tournament.name;

  const selectEl = document.getElementById('category-select');
  selectEl.innerHTML = categories.map(cat =>
    `<option value="${cat.id}">${esc(cat.name)}</option>`
  ).join('');
  document.getElementById('category-bar').style.display = '';

  selectEl.addEventListener('change', () => {
    renderCategory(parseInt(selectEl.value, 10));
  });

  function calcStandings(teams, matches) {
    const stats = {};
    teams.forEach(t => {
      stats[t.id] = { id:t.id, name:t.name, w:0, l:0, bye:0, pts_for:0, pts_against:0, played:0, forfeited:false };
    });
    matches.filter(m => m.forfeit_team_id).forEach(m => {
      if (stats[m.forfeit_team_id]) stats[m.forfeit_team_id].forfeited = true;
    });
    matches.filter(m => m.status === 'completed').forEach(m => {
      if (!stats[m.team_a_id] || !stats[m.team_b_id]) return;
      stats[m.team_a_id].pts_for     += m.score_a !== null ? parseInt(m.score_a, 10) : 0;
      stats[m.team_a_id].pts_against += m.score_b !== null ? parseInt(m.score_b, 10) : 0;
      stats[m.team_b_id].pts_for     += m.score_b !== null ? parseInt(m.score_b, 10) : 0;
      stats[m.team_b_id].pts_against += m.score_a !== null ? parseInt(m.score_a, 10) : 0;
      stats[m.team_a_id].played++;
      stats[m.team_b_id].played++;
      if (m.winner_id === m.team_a_id) { stats[m.team_a_id].w++; stats[m.team_b_id].l++; }
      else if (m.winner_id === m.team_b_id) { stats[m.team_b_id].w++; stats[m.team_a_id].l++; }
    });
    matches.filter(m => m.status === 'bye').forEach(m => {
      if (stats[m.team_a_id]) stats[m.team_a_id].bye++;
    });
    return Object.values(stats).sort((a, b) => {
      if (a.forfeited !== b.forfeited) return a.forfeited ? 1 : -1;
      if (b.pts_for !== a.pts_for) return b.pts_for - a.pts_for;
      const diffA = a.pts_for - a.pts_against, diffB = b.pts_for - b.pts_against;
      if (diffB !== diffA) return diffB - diffA;
      if (b.w !== a.w) return b.w - a.w;
      return a.l - b.l;
    });
  }

  function renderStandingsTable(standings) {
    if (!standings.length) return '<div class="empty">No standings yet.</div>';
    return `<table>
      <thead><tr>
        <th style="width:48px;">#</th><th>Team</th>
        <th>W</th><th>L</th>
        <th>Pts For</th><th>Diff</th>
      </tr></thead>
      <tbody>
        ${standings.map((s,i) => {
          const diff = s.pts_for - s.pts_against;
          const rankClass = i===0?'top1':i===1?'top2':i===2?'top3':'';
          return `<tr>
            <td><span class="rank-num ${rankClass}">${i+1}</span></td>
            <td style="font-weight:700;">${esc(s.name)}${s.forfeited?` <span style="color:var(--orange);font-size:10px;">(FF)</span>`:''}</td>
            <td><span class="stat-win">${s.w}</span></td>
            <td><span class="${s.l>0?'stat-loss':'stat-win'}">${s.l}</span></td>
            <td style="color:var(--blue);font-weight:700;">${s.pts_for}</td>
            <td><span class="${diff>=0?'stat-diff-pos':'stat-diff-neg'}">${diff>0?'+':''}${diff}</span></td>
          </tr>`;
        }).join('')}
      </tbody></table>`;
  }

  function renderBracket(bracketMatches, tMap) {
    if (!bracketMatches.length) return '';
    const roundOrder = ['R32','R16','QF','Semifinals','3rd Place','Final'];
    const grouped = {};
    bracketMatches.forEach(m => {
      if (!grouped[m.round_name]) grouped[m.round_name] = [];
      grouped[m.round_name].push(m);
    });
    const orderedRounds = roundOrder.filter(r => grouped[r]);
    const cols = orderedRounds.map(round => {
      return `<div class="bracket-col">
        <div class="bracket-col-title">${esc(round)}</div>
        ${grouped[round].map(m => {
          const tA = m.team_a_id ? tMap[m.team_a_id] : null;
          const tB = m.team_b_id ? tMap[m.team_b_id] : null;
          const isBye = m.status === 'bye';
          const done  = m.status === 'completed';
          const aWon  = done && m.winner_id === m.team_a_id;
          const bWon  = done && m.winner_id === m.team_b_id;
          const playersA = tA ? getPlayerNames(tA) : '';
          const playersB = tB ? getPlayerNames(tB) : '';
          return `<div class="bracket-match">
            <div class="bracket-team ${aWon?'winner':''} ${isBye&&!tB?'bye':''}">
              <div style="flex:1;min-width:0;">
                <div class="bracket-team-name">${tA?esc(tA.name):'<em style="color:var(--text-muted)">TBD</em>'}${m.forfeit_team_id===m.team_a_id?' <span style="font-size:10px;font-weight:800;color:var(--orange);">(FF)</span>':''}</div>
                ${playersA?`<div class="bracket-team-players">${esc(playersA)}</div>`:''}
              </div>
              ${done?`<span class="bracket-score">${m.score_a??''}</span>`:''}
            </div>
            <div class="bracket-team ${bWon?'winner':''} ${isBye?'bye':''}">
              <div style="flex:1;min-width:0;">
                <div class="bracket-team-name">${tB?esc(tB.name):isBye?'<em style="color:var(--teal)">BYE</em>':'<em style="color:var(--text-muted)">TBD</em>'}${m.forfeit_team_id===m.team_b_id?' <span style="font-size:10px;font-weight:800;color:var(--orange);">(FF)</span>':''}</div>
                ${playersB?`<div class="bracket-team-players">${esc(playersB)}</div>`:''}
              </div>
              ${done?`<span class="bracket-score">${m.score_b??''}</span>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');
    return `<div class="bracket-wrap"><div class="bracket">${cols}</div></div>`;
  }

  function renderPodium(bracketMatches, tMap) {
    const finalMatch = bracketMatches.find(m => m.round_name==='Final' && m.status==='completed');
    if (!finalMatch || !finalMatch.winner_id) return '';
    const champion  = tMap[finalMatch.winner_id];
    const runnerId  = finalMatch.team_a_id===finalMatch.winner_id ? finalMatch.team_b_id : finalMatch.team_a_id;
    const runnerUp  = runnerId ? tMap[runnerId] : null;
    const thirdMatch= bracketMatches.find(m => m.round_name==='3rd Place' && m.status==='completed');
    const third     = thirdMatch?.winner_id ? tMap[thirdMatch.winner_id] : null;
    if (!champion) return '';
    const championPlayers = getPlayerNames(champion);
    const runnerUpPlayers = runnerUp ? getPlayerNames(runnerUp) : '';
    const thirdPlayers    = third ? getPlayerNames(third) : '';
    const medalClass = { '🥇': 'gold', '🥈': 'silver', '🥉': 'bronze' };
    const medalEmoji = { gold: '🥇', silver: '🥈', bronze: '🥉' };

    const slot = (team, medal, barClass, labelText, isChampion, playerNames) => {
      if (!team) return '';
      const mClass   = medalClass[medal] || '';
      const nameList = playerNames ? playerNames.split(' & ').map(n => n.trim()).filter(Boolean) : [];

      // Player names stacked — no avatars, same text style as podium-name in players.html
      const playersHtml = nameList.length
        ? nameList.map(name => `<div class="podium-player-name">${esc(name)}</div>`).join('')
        : '';

      return `<div class="podium-slot">
        ${isChampion ? '<div class="podium-crown">👑</div>' : ''}
        <div class="podium-avatar ${mClass}">${esc(team.name)}</div>
        ${playersHtml}
        <div class="podium-label">${esc(labelText)}</div>
        <div class="podium-bar ${barClass}">
          <span class="medal">${medalEmoji[mClass] || ''}</span>
        </div>
      </div>`;
    };
    return `<div class="phase-label">Final Results</div>
      <div class="podium-section">
        <div class="podium">
          ${slot(runnerUp, '🥈', 'bar-silver', '2nd Place', false, runnerUpPlayers)}
          ${slot(champion, '🥇', 'bar-gold',   'Champion',  true,  championPlayers)}
          ${slot(third,    '🥉', 'bar-bronze',  '3rd Place', false, thirdPlayers)}
        </div>
      </div>`;
  }

  function renderRRMatches(matches, tMap) {
    const completed = matches.filter(m => m.status === 'completed' || m.status === 'forfeited');
    if (!completed.length) return '';
    const rounds = [...new Set(completed.map(m => m.round))].sort((a, b) => a - b);
    let html = '<div class="rr-rounds">';
    rounds.forEach(round => {
      html += `<div class="rr-round-label">Round ${round}</div>`;
      completed.filter(m => m.round === round).forEach(m => {
        const tA = tMap[m.team_a_id], tB = tMap[m.team_b_id];
        const nameA = tA ? esc(tA.name) : 'TBD';
        const nameB = tB ? esc(tB.name) : 'TBD';
        const playersA = tA ? getPlayerNames(tA) : '';
        const playersB = tB ? getPlayerNames(tB) : '';
        const aWon = m.winner_id === m.team_a_id, bWon = m.winner_id === m.team_b_id;
        const ffA = m.forfeit_team_id === m.team_a_id, ffB = m.forfeit_team_id === m.team_b_id;
        const court = m.court ? `<span class="rr-court-badge">Court ${m.court}</span>` : '';
        html += `<div class="rr-match-row">
          ${court}
          <div class="rr-team-block" style="text-align:right;">
            <div class="rr-team-name">${nameA}${ffA ? ' <span style="font-size:10px;color:var(--orange);">(FF)</span>' : ''}</div>
            ${playersA ? `<div class="rr-team-players">${esc(playersA)}</div>` : ''}
          </div>
          <div class="rr-score-block">
            <span class="rr-score ${aWon?'winner':'loser'}">${m.score_a??'—'}</span>
            <span class="rr-score-sep">—</span>
            <span class="rr-score ${bWon?'winner':'loser'}">${m.score_b??'—'}</span>
          </div>
          <div class="rr-team-block">
            <div class="rr-team-name">${nameB}${ffB ? ' <span style="font-size:10px;color:var(--orange);">(FF)</span>' : ''}</div>
            ${playersB ? `<div class="rr-team-players">${esc(playersB)}</div>` : ''}
          </div>
        </div>`;
      });
    });
    html += '</div>';
    return html;
  }

  function renderCategory(catId) {
    const teams          = allTeams.filter(t => t.category_id===catId);
    const rrMatches      = allRR.filter(m => m.category_id===catId);
    const bracketMatches = allBracket.filter(m => m.category_id===catId);
    const groups         = allGroups.filter(g => g.category_id===catId);
    const useGroups      = groups.length > 0;
    const tMap           = {};
    teams.forEach(t => { tMap[t.id] = t; });

    let html = '';

    const statusLabel = {draft:'⏳ Draft',active:'🟢 In Progress',completed:'🏆 Completed'}[tournament.status] || tournament.status;
    html += `<div class="status-banner ${tournament.status}">${statusLabel}</div>`;

    if (bracketMatches.length) html += renderPodium(bracketMatches, tMap);

    if (bracketMatches.length) {
      html += `<div class="phase-label">Finals Bracket</div>`;
      html += `<div class="card">${renderBracket(bracketMatches, tMap)}</div>`;
    }

    if (rrMatches.length) {
      html += `<div class="phase-label">${useGroups ? 'Group Stage' : 'Round Robin Standings'}</div>`;
      if (useGroups) {
        groups.forEach(g => {
          const gTeams     = teams.filter(t => t.group_id===g.id);
          const gMatches   = rrMatches.filter(m => m.group_id===g.id);
          const gStandings = calcStandings(gTeams, gMatches);
          const doneSome   = gMatches.some(m => m.status==='completed');
          html += `<div class="group-block">
            <div class="group-header">
              <span class="group-badge">Group ${esc(g.name)}</span>
              <span style="font-size:11px;color:var(--text-muted);font-weight:700;">${gTeams.length} teams</span>
            </div>
            ${doneSome ? renderStandingsTable(gStandings) : '<div class="empty" style="padding:12px 0;">No matches played yet.</div>'}
            ${renderRRMatches(gMatches, tMap)}
          </div>`;
        });
      } else {
        const standings = calcStandings(teams, rrMatches);
        const doneSome  = rrMatches.some(m => m.status==='completed');
        html += `<div class="card">${doneSome ? renderStandingsTable(standings) : '<div class="empty">No matches played yet.</div>'}${renderRRMatches(rrMatches, tMap)}</div>`;
      }
    }

    if (!rrMatches.length && !bracketMatches.length && teams.length) {
      html += `<div class="phase-label">Registered Teams</div>
        <div class="teams-grid">
          ${teams.map((t, i) => {
            const seed = i + 1;
            const seedClass = seed===1?'s1':seed===2?'s2':seed===3?'s3':'';
            const players = getPlayerNames(t);
            return `<div class="team-card">
              <div class="team-seed ${seedClass}">${seed}</div>
              <div class="team-info">
                <div class="team-name">${esc(t.name)}</div>
                ${players ? `<div class="team-players">${esc(players)}</div>` : ''}
              </div>
            </div>`;
          }).join('')}
        </div>`;
    }

    if (!html) html = '<div class="empty">No results available yet for this category.</div>';
    document.getElementById('main-content').innerHTML = html;
  }

  if (categories.length) {
    renderCategory(categories[0].id);
  } else {
    document.getElementById('main-content').innerHTML =
      '<div class="empty">No categories found for this tournament.</div>';
  }
})();
</script>
</body>
</html>
